{% extends "father.html" %}
{% load static %}

<!-- este bloque es el que esta en father.html
 y dentro podras ponen contenido personalizado -->
{% block title %}Dashboard{% endblock %}

{% block body %}
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #6f42c1;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Servicio al Cliente</a>
        <div class="position-absolute start-50 translate-middle-x d-flex align-items-center gap-2">
            <span class="text-white small">🌙</span>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="darkModeToggle" role="switch">
            </div>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard/">Dashboard</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
               <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Acciones</a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{% url 'logout' %}">Cerrar Sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<center>
    <div class="container mt-4">
        <img src="{% static 'customer_service.png' %}" alt="Customer Service" class="img-fluid mb-3">
    </div>
</center>

<div class="container mt-3">
    <div class="input-group">
        <input type="text" class="form-control rounded-pill ps-4" id="searchInput" placeholder="Buscar..." style="border: 2px solid #00f0ff; box-shadow: 0 0 8px #00f0ff, 0 0 16px #00f0ff;">
        <button class="btn btn-primary rounded-pill ms-2" style="background-color: #6f42c1; border-color: #6f42c1;" onclick="handleSearch()">Buscar</button>
    </div>
</div>

<script>
    const toggle = document.getElementById('darkModeToggle');
    toggle.addEventListener('change', () => {
        document.body.classList.toggle('bg-dark', toggle.checked);
        document.body.classList.toggle('text-white', toggle.checked);
    });

    function handleSearch() {
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            window.location.href = "{% url 'account_details' %}?q=" + encodeURIComponent(query);
        }
    }
</script>

{% endblock %}
