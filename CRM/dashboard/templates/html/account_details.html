{% extends "father.html" %}
{% load static %}

<!-- este bloque es el que esta en father.html
 y dentro podras ponen contenido personalizado -->
{% block title %}Account Details{% endblock %}

{% block body %}
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #6f42c1;">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Servicio al Cliente</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="/dashboard/">Dashboard</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Acciones</a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{% url 'logout' %}">Cerrar Sesión</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="accordion" id="accordionDashboard">
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#item1">
                    Sección 1
                </button>
            </h2>
            <div id="item1" class="accordion-collapse collapse show" data-bs-parent="#accordionDashboard">
                <div class="accordion-body">Contenido de la sección 1.</div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#item2">
                    Sección 2
                </button>
            </h2>
            <div id="item2" class="accordion-collapse collapse" data-bs-parent="#accordionDashboard">
                <div class="accordion-body">Contenido de la sección 2.</div>
            </div>
        </div>
        <div class="accordion-item">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#item3">
                    Sección 3
                </button>
            </h2>
            <div id="item3" class="accordion-collapse collapse" data-bs-parent="#accordionDashboard">
                <div class="accordion-body">Contenido de la sección 3.</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
