<!-- esta es para heredar lo que tiene father.html-->
{% extends "father.html" %}

<!-- esta indicacion es para incrustar css -->
{% load static %}

{% block title %}Login{% endblock %}

{% block body %}
<link rel="stylesheet" href="{% static 'login.css' %}">

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4" style="width: 350px;">
        <h4 class="text-center mb-4">Bienvenido!</h4>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn w-100" style="background-color: #6f42c1; color: white;">Ingresar</button>
        </form>
    </div>
</div>
{% endblock %}
